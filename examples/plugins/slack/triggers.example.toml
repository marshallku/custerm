# ---------------------------------------------------------------------
# 4. Open Slack-thread URL on mention via WebView panel (cross-plugin)
#    Slack's deep-link format: https://<workspace>.slack.com/archives/<channel>/p<ts-without-dot>
#    Note: that URL transform isn't expressible in the current
#    interpolation DSL (no string ops); user would need a small wrapper
#    action (Phase 11.3 candidate). Kept here as a "future composable"
#    sketch.
# ---------------------------------------------------------------------

# ---------------------------------------------------------------------
# 5. Emoji-react → Todo capture (parity with Discord 2.5)
#
# Use case: see something in Slack, react with :memo:, nestty captures
# the message as a Todo with the permalink + body. Uses Phase 14.2
# `await` to correlate the get_message reply with THIS specific
# trigger instance — without correlation every successful
# get_message would trigger every reaction-driven todo.
#
# Two-trigger chain:
#   - `slack-memo-capture-fetch` fires on `slack.reaction`,
#     filtered to reaction="memo", and dispatches `slack.get_message`.
#     The await waits for `slack.get_message.completed` and
#     synthesizes `slack-memo-capture-fetch.awaited` carrying the
#     reaction event's fields at top level + the Slack message
#     object nested under `event.await:`.
#   - `slack-memo-capture-create` listens for that synthesized
#     event (unique per trigger), so other unrelated get_message
#     calls don't trigger Todo creation.
#
# Reaction names in Slack don't include colons — `event.reaction ==
# "memo"` matches the `:memo:` reaction. The condition lexer
# supports unicode strings as well, so `event.reaction == "📝"`
# would work for actual unicode emoji reactions.
# ---------------------------------------------------------------------
# [[triggers]]
# name = "slack-memo-capture-fetch"
# action = "slack.get_message"
# params = { channel = "{event.channel}", ts = "{event.ts}" }
# condition = """event.reaction == "memo" """
# [triggers.when]
# event_kind = "slack.reaction"
# [triggers.await]
# event_kind = "slack.get_message.completed"
# timeout_seconds = 10
# on_timeout = "abort"
#
# [[triggers]]
# name = "slack-memo-capture-create"
# action = "todo.create"
# params = { title = "Slack capture {event.ts}", body = """
# {event.await.text}
#
# Source: {event.permalink}
# """, workspace = "default" }
# [triggers.when]
# event_kind = "slack-memo-capture-fetch.awaited"
#
# `event.permalink` reads the original reaction event's permalink
# (top-level after build_awaited_payload nests the get_message reply
# under `await:`), so the link points to the user's reacted-on
# message rather than to the bot's API call. May be null if
# chat.getPermalink failed at event time.
