# Example triggers driven by the git plugin.
#
# The git plugin emits one event today:
#   git.worktree_add.completed { workspace, path, branch, base }
#
# It's published whenever `git.worktree_add` succeeds — not by the
# trigger engine itself yet (Phase 14.1 will generalize this to
# every action's `<action>.completed`), but the plugin emits it
# directly so chained triggers compose ahead of 14.1 landing.
#
# Filesystem-driven events (`git.worktree_created`,
# `git.branch_created`, `git.checkout`, ...) are slice 2 of Phase 17
# — uncomment after that lands.

# ---------------------------------------------------------------------
# 1. Phase 15.2 sketch: when git.worktree_add succeeds, drop a
#    Claude session in the new worktree. Phase 18 ships the
#    `claude.start` action; this trigger composes git.worktree_add
#    with it directly. The session_name is derived from the
#    worktree path so re-running on the same worktree
#    re-attaches the live tmux session instead of stacking dups.
#
#    Note: `prompt` field is rejected by claude.start in slice 1
#    (Phase 18.1) — it lands in 18.2 once tmux send-keys timing
#    is designed. The user pastes the prompt into claude after
#    the tab opens.
# ---------------------------------------------------------------------
[[triggers]]
name = "worktree-then-claude"
action = "claude.start"
params = { workspace_path = "{event.path}" }

[triggers.when]
event_kind = "git.worktree_add.completed"

# ---------------------------------------------------------------------
# 2. KB log of every worktree creation, for end-of-day review.
# ---------------------------------------------------------------------
[[triggers]]
name = "log-new-worktrees-to-kb"
action = "kb.append"
params = { id = "logs/worktrees.md", content = "- {event.workspace}/{event.branch} → {event.path}\n", ensure = true }

[triggers.when]
event_kind = "git.worktree_add.completed"
